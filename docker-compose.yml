services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mypridewont
      POSTGRES_PASSWORD: mypridewont
      POSTGRES_DB: mypridewont
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mypridewont"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://mypridewont:mypridewont@db:5432/mypridewont"
      SESSION_SECRET: "dev-secret-change-me-in-prod"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyPrideWont — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1714;
    --ink-light: #3d3730;
    --ink-faint: #8a8074;
    --red: #c4342d;
    --divider: #c9bfad;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  /* Diagonal stripes background */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 30px,
      rgba(196,52,45,0.04) 30px,
      rgba(196,52,45,0.04) 60px
    );
    pointer-events: none;
  }

  .login-box {
    width: 320px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .logo span { color: var(--red); }

  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    margin-bottom: 2.5rem;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1rem;
  }

  .input-wrap input {
    width: 100%;
    background: transparent;
    border: 2px solid var(--ink-faint);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 2px;
    outline: none;
    text-align: center;
    letter-spacing: 0.15em;
    transition: border-color 0.15s;
  }
  .input-wrap input::placeholder {
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-size: 0.85rem;
  }
  .input-wrap input:focus {
    border-color: var(--red);
  }

  .login-btn {
    width: 100%;
    background: var(--red);
    color: var(--cream);
    border: 2px solid var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    padding: 0.6rem 1rem;
    border-radius: 2px;
    cursor: pointer;
    box-shadow: 3px 3px 0 rgba(245,240,232,0.15);
    transition: all 0.1s;
  }
  .login-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 rgba(245,240,232,0.15);
  }

  .error {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--red);
    margin-top: 1rem;
    opacity: 0;
  }
  .error.show { opacity: 1; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">MY<span>PRIDE</span>WONT</div>
  <div class="tagline">No excuses. No mercy.</div>

  <div class="input-wrap">
    <input type="password" placeholder="Password" autofocus>
  </div>
  <button class="login-btn">GET IN ME</button>
  <div class="error">Wrong password. Try again.</div>
</div>

</body>
</html>
